# GhostBot DEMO compose — for deploying to demo.ghostbot.dev.
#
# Differences from the production docker-compose.yml:
# - DEMO_MODE=true — agent jobs + secret saves disabled
# - No docker-socket-proxy (agents can't launch anyway)
# - Ollama baked in as a service (demo visitors don't bring their own)
# - A cron sidecar runs demo-reset.sh daily at 04:00 UTC
#
# Usage:
#   docker compose -f docker-compose.demo.yml up -d
#
# Required env on the demo host:
#   AUTH_SECRET         — openssl rand -base64 32
#   ENCRYPTION_KEY      — openssl rand -base64 32 (different from AUTH_SECRET)
#   NEXT_PUBLIC_DEMO=1  — optional UI hint

services:
  ghostbot:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: ghostbot-demo
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ghostbot-demo-data:/app/data
      - ./scripts/demo-reset.sh:/app/scripts/demo-reset.sh:ro
    environment:
      - AUTH_SECRET=${AUTH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_PATH=/app/data/db/ghostbot.sqlite
      - DEMO_MODE=true
      - OLLAMA_BASE_URL=http://ollama:11434
      # Small fast model for demo purposes — no coding agents run,
      # so we don't need a 32B behemoth.
      - LLM_PROVIDER=ollama
      - LLM_MODEL=qwen2.5-coder:1.5b
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: ghostbot-demo-ollama
    restart: unless-stopped
    volumes:
      - ollama-demo-models:/root/.ollama
    # GPU support optional — a 1.5B model runs fine on CPU.

  # Daily reset at 04:00 UTC. Uses supercronic so it runs inside the
  # container world (avoids host-side cron). Alternative: a Dokploy
  # scheduled task calling `docker exec ghostbot-demo /app/scripts/demo-reset.sh`.
  reset-cron:
    image: alpine:latest
    container_name: ghostbot-demo-reset-cron
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts/demo-reset.sh:/demo-reset.sh:ro
    environment:
      - DEMO_MODE=true
      - CONTAINER_NAME=ghostbot-demo
    command: >
      sh -c "apk add --no-cache docker-cli &&
             echo '0 4 * * * DEMO_MODE=true CONTAINER_NAME=ghostbot-demo /demo-reset.sh' > /etc/crontabs/root &&
             crond -f -l 8"

volumes:
  ghostbot-demo-data:
  ollama-demo-models:
