services:
  # ─── docker-socket-proxy (recommended) ─────────────────────────────
  # Restricts what GhostBot can do with the Docker API. Without this
  # proxy, bind-mounting /var/run/docker.sock grants GhostBot host-root
  # privilege. With this proxy, GhostBot can only launch/kill/inspect
  # its own containers — no node-level escape path.
  #
  # See SECURITY.md for rationale. If you strip this and mount the raw
  # socket into the ghostbot container instead, you're opting into
  # "the admin user of GhostBot = root on the host" as a threat model.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: ghostbot-docker-proxy
    restart: unless-stopped
    environment:
      # Allow list — everything not explicitly enabled is blocked
      - CONTAINERS=1  # list, create, inspect, logs, wait, kill, remove
      - IMAGES=1      # inspect (the launcher checks for the image before starting)
      - NETWORKS=1    # detectNetwork() resolves the compose network for agent containers
      - POST=1        # POST methods (create/start/kill) on the above
      - DELETE=1      # container removal after jobs finish
      - EXEC=1        # container exec (used by execInContainer)
      # Everything below explicitly OFF — adjust only if you know why
      - AUTH=0
      - BUILD=0
      - COMMIT=0
      - CONFIGS=0
      - DISTRIBUTION=0
      - EVENTS=0
      - INFO=0
      - NODES=0
      - PLUGINS=0
      - SECRETS=0
      - SERVICES=0
      - SESSION=0
      - SWARM=0
      - SYSTEM=0
      - TASKS=0
      - VOLUMES=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # Intentionally NOT exposing 2375 on the host — only reachable
    # from inside the compose network.

  ghostbot:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: ghostbot
    restart: unless-stopped
    depends_on:
      - docker-proxy
    ports:
      - "3000:3000"
    volumes:
      - ghostbot-data:/app/data
      # NOTE: the raw docker.sock is no longer mounted into the app
      # container. All Docker API traffic goes via docker-proxy above.
      # If you're migrating from a previous compose that bind-mounted
      # the socket, remove that line after this deploy goes green.
    environment:
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_PATH=${DATABASE_PATH:-data/db/ghostbot.sqlite}
      - DOCKER_HOST=tcp://docker-proxy:2375
    env_file:
      - .env

  # Optional: local Ollama instance
  # Uncomment to run Ollama alongside GhostBot
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ghostbot-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-models:/root/.ollama
  #   # GPU support (NVIDIA):
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: all
  #   #           capabilities: [gpu]

volumes:
  ghostbot-data:
  # ollama-models:
