name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub Releases
  packages: write   # push to ghcr.io

jobs:
  docker:
    name: Build + push Docker image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ghostbot
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog entry for this tag
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull the most recent changelog section — if you maintain
          # per-version sections in CHANGELOG.md, this will land them
          # in the release notes. Falls back to "see changelog" if the
          # file or section isn't found.
          if [ -f CHANGELOG.md ]; then
            awk "/^## /{flag=!flag; if(!flag && found) exit; if(flag) found=1; next} found" CHANGELOG.md > RELEASE_NOTES.md || echo "See CHANGELOG.md" > RELEASE_NOTES.md
          else
            echo "See CHANGELOG.md" > RELEASE_NOTES.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
